name : Continuous Integration and GitOps Bump
on:
  push:
    branches:
      - main # Triggers when developers push or merge code to main [cite: 22]

permissions:
  id-token: write
  contents: read
    
jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Check AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-app
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: GitOps registry manifest update ("The GitOps Bump")
        env:
          GITOPS_REPO: "Akshatha-wq/gitops-repo" # Update to your target user/repo
          NEW_TAG: "latest"
        run: |
          git config --global user.name "github actions automation"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the distinct environment config repository [cite: 24]
          git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git gitops-env
          cd gitops-env

          # Install yq dynamically to update values.yaml with the new image tag [cite: 24]
          yq -i ".image.tag = \"${{ env.NEW_TAG }}\"" charts/my-app/values.yaml

          # Check if yq actually modified the file before committing
          if git diff --exit-code charts/my-app/values.yaml; then
            echo "No changes detected. Image tag is already up to date."
          else
            echo "Changes detected! Committing new image tag..."
            git add charts/my-app/values.yaml
            git commit -m "chore(deploy): push new version tag ${{ env.NEW_TAG }} [skip ci]"
            git push origin main
          fi